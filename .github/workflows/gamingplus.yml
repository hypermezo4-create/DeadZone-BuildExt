name: DeadZone GamingPlus Xiaomi Build

run-name: "DeadZone GamingPlus  ${{ inputs.request_id }}"

on:
  workflow_dispatch:
    inputs:
      request_id:
        description: 'DeadZone control request ID'
        required: true
        type: string
      input_url:
        description: 'URL of the ROM to build'
        required: true
        type: string
      builder_name:
        description: 'Builder name'
        required: false
        type: string
      builder_id:
        description: 'Builder ID'
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: deadzone-gamingplus
  cancel-in-progress: false

jobs:
  build:
    name: Build ROM
    runs-on: self-hosted
    timeout-minutes: 180
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
      RCLONE_CONFIG_BASE64: ${{ secrets.RCLONE_CONFIG_BASE64 }}
      RCLONE_REMOTE_NAME: ${{ secrets.RCLONE_REMOTE_NAME }}
      RCLONE_UPLOAD_DIR: ${{ secrets.RCLONE_UPLOAD_DIR }}
      BUILD_PROGRESS_SECRET: ${{ secrets.BUILD_PROGRESS_SECRET }}
      CONTROL_BOT_TELEMETRY_URL: https://deadzonebot.fly.dev/telemetry
      REQUEST_ID: ${{ inputs.request_id }}
      INPUT_URL: ${{ inputs.input_url }}
      BUILDER_NAME: ${{ inputs.builder_name }}
      BUILDER_ID: ${{ inputs.builder_id }}

    steps:
      - name: Validate request ID
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$REQUEST_ID" =~ ^DZ-GP-[0-9]{8}-[0-9]{4}$ ]]; then
            echo "Invalid request_id format: expected DZ-GP-YYYYMMDD-NNNN" >&2
            exit 1
          fi
          {
            echo "### DeadZone Control Contract"
            echo "- request_id: $REQUEST_ID"
            echo "- builder_name: ${BUILDER_NAME:-manual}"
          } >> "$GITHUB_STEP_SUMMARY"

      # Keep launcher helpers independent of any stale self-hosted runner workspace.
      - name: Checkout DeadZone-BuildExt launcher
        uses: actions/checkout@v4
        with:
          path: .
          fetch-depth: 1
          persist-credentials: false

      - name: Initialize telemetry clock
        shell: bash
        run: |
          set -euo pipefail
          echo "BUILD_STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Telemetry - preparing
        shell: bash
        run: |
          set -euo pipefail
          stage_started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "DZ_CURRENT_STAGE_KEY=preparing" >> "$GITHUB_ENV"
          echo "DZ_COMPLETED_STAGES=0" >> "$GITHUB_ENV"
          echo "DZ_STAGE_STARTED_AT=$stage_started_at" >> "$GITHUB_ENV"
          python3 scripts/send_telemetry.py \
            --request-id "$REQUEST_ID" \
            --stage-key preparing \
            --stage-state in_progress \
            --completed-stages 0 \
            --total-stages 8 \
            --build-started-at "$BUILD_STARTED_AT" \
            --stage-started-at "$stage_started_at" \
            --message "Preparing the GamingPlus build." || true

      - name: Clean unused runner files
        if: runner.environment == 'github-hosted'
        shell: bash
        run: |
          docker system prune --all --force || true
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc || true
          sudo apt-get clean || true

      - name: Maximize build space
        if: runner.environment == 'github-hosted'
        uses: easimon/maximize-build-space@master
        with:
          swap-size-mb: 1024
          root-reserve-mb: 512
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: Check available disk space
        run: df -h /

      - name: Telemetry - loading build engine
        shell: bash
        run: |
          set -euo pipefail
          stage_started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "DZ_CURRENT_STAGE_KEY=loading_engine" >> "$GITHUB_ENV"
          echo "DZ_COMPLETED_STAGES=1" >> "$GITHUB_ENV"
          echo "DZ_STAGE_STARTED_AT=$stage_started_at" >> "$GITHUB_ENV"
          python3 scripts/send_telemetry.py \
            --request-id "$REQUEST_ID" \
            --stage-key loading_engine \
            --stage-state in_progress \
            --completed-stages 1 \
            --total-stages 8 \
            --build-started-at "$BUILD_STARTED_AT" \
            --stage-started-at "$stage_started_at" \
            --message "Loading the build engine." || true

      - name: Checkout private GamingPlus engine
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.GAMINGPLUS_ENGINE_REPOSITORY }}
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          ref: main
          path: toolbuild
          fetch-depth: 1
          lfs: true
          persist-credentials: false

      - name: Set timezone
        shell: bash
        run: |
          sudo ln -snf /usr/share/zoneinfo/Asia/Ho_Chi_Minh /etc/localtime
          echo Asia/Ho_Chi_Minh | sudo tee /etc/timezone >/dev/null

      - name: Set up OpenJDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Telemetry - installing tools
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          stage_started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "DZ_CURRENT_STAGE_KEY=installing_tools" >> "$GITHUB_ENV"
          echo "DZ_COMPLETED_STAGES=2" >> "$GITHUB_ENV"
          echo "DZ_STAGE_STARTED_AT=$stage_started_at" >> "$GITHUB_ENV"
          python3 scripts/send_telemetry.py \
            --request-id "$REQUEST_ID" \
            --stage-key installing_tools \
            --stage-state in_progress \
            --completed-stages 2 \
            --total-stages 8 \
            --build-started-at "$BUILD_STARTED_AT" \
            --stage-started-at "$stage_started_at" \
            --message "Installing build tools." || true

      - name: Install build dependencies
        working-directory: toolbuild
        shell: bash
        run: |
          set -euo pipefail
          python3 -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install requests
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          sudo bash setup.sh 2>&1 | tee -a build_action.log

      - name: Send start notification
        working-directory: toolbuild
        run: python3 notify.py start "${{ github.repository }}" "$INPUT_URL" "xst" "$BUILDER_NAME" "$BUILDER_ID"

      - name: Grant tool permissions
        working-directory: toolbuild
        run: sudo chmod -R u+rwX,go+rX .

      - name: Telemetry - building
        shell: bash
        run: |
          set -euo pipefail
          stage_started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "DZ_CURRENT_STAGE_KEY=building" >> "$GITHUB_ENV"
          echo "DZ_COMPLETED_STAGES=3" >> "$GITHUB_ENV"
          echo "DZ_STAGE_STARTED_AT=$stage_started_at" >> "$GITHUB_ENV"
          python3 scripts/send_telemetry.py \
            --request-id "$REQUEST_ID" \
            --stage-key building \
            --stage-state in_progress \
            --completed-stages 3 \
            --total-stages 8 \
            --build-started-at "$BUILD_STARTED_AT" \
            --stage-started-at "$stage_started_at" \
            --message "Building the ROM." || true

      - name: Build ROM
        working-directory: toolbuild
        shell: bash
        run: |
          set -euo pipefail
          sudo -E bash build.sh "$INPUT_URL" "${{ github.repository }}" "xst" "$BUILDER_NAME" "$BUILDER_ID" 2>&1 | tee -a build_action.log

      - name: Telemetry - packaging
        shell: bash
        run: |
          set -euo pipefail
          stage_started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "DZ_CURRENT_STAGE_KEY=packaging" >> "$GITHUB_ENV"
          echo "DZ_COMPLETED_STAGES=4" >> "$GITHUB_ENV"
          echo "DZ_STAGE_STARTED_AT=$stage_started_at" >> "$GITHUB_ENV"
          python3 scripts/send_telemetry.py \
            --request-id "$REQUEST_ID" \
            --stage-key packaging \
            --stage-state in_progress \
            --completed-stages 4 \
            --total-stages 8 \
            --build-started-at "$BUILD_STARTED_AT" \
            --stage-started-at "$stage_started_at" \
            --message "Packaging the ROM." || true

      - name: Pack ROM
        working-directory: toolbuild
        shell: bash
        run: |
          set -euo pipefail
          python3 notify.py pack "${{ github.repository }}" "$INPUT_URL" "xst" "$BUILDER_NAME" "$BUILDER_ID"
          sudo bash packROM.sh 2>&1 | tee -a build_action.log

      - name: Telemetry - preparing upload
        shell: bash
        run: |
          set -euo pipefail
          stage_started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "DZ_CURRENT_STAGE_KEY=preparing_upload" >> "$GITHUB_ENV"
          echo "DZ_COMPLETED_STAGES=5" >> "$GITHUB_ENV"
          echo "DZ_STAGE_STARTED_AT=$stage_started_at" >> "$GITHUB_ENV"
          python3 scripts/send_telemetry.py \
            --request-id "$REQUEST_ID" \
            --stage-key preparing_upload \
            --stage-state in_progress \
            --completed-stages 5 \
            --total-stages 8 \
            --build-started-at "$BUILD_STARTED_AT" \
            --stage-started-at "$stage_started_at" \
            --message "Preparing the upload." || true

      - name: Set up Rclone
        working-directory: toolbuild
        shell: bash
        run: |
          set -euo pipefail
          sudo -E bash uploadROM.sh setup 2>&1 | tee -a build_action.log

      - name: Telemetry - uploading
        shell: bash
        run: |
          set -euo pipefail
          stage_started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "DZ_CURRENT_STAGE_KEY=uploading" >> "$GITHUB_ENV"
          echo "DZ_COMPLETED_STAGES=6" >> "$GITHUB_ENV"
          echo "DZ_STAGE_STARTED_AT=$stage_started_at" >> "$GITHUB_ENV"
          python3 scripts/send_telemetry.py \
            --request-id "$REQUEST_ID" \
            --stage-key uploading \
            --stage-state in_progress \
            --completed-stages 6 \
            --total-stages 8 \
            --build-started-at "$BUILD_STARTED_AT" \
            --stage-started-at "$stage_started_at" \
            --message "Uploading the package." || true

      - name: Upload ROM
        working-directory: toolbuild
        shell: bash
        run: |
          set -euo pipefail
          python3 notify.py upload "${{ github.repository }}" "$INPUT_URL" "xst" "$BUILDER_NAME" "$BUILDER_ID"
          sudo -E bash uploadROM.sh 2>&1 | tee -a build_action.log

      - name: Telemetry - finalizing start
        shell: bash
        run: |
          set -euo pipefail
          stage_started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "DZ_CURRENT_STAGE_KEY=finalizing" >> "$GITHUB_ENV"
          echo "DZ_COMPLETED_STAGES=7" >> "$GITHUB_ENV"
          echo "DZ_STAGE_STARTED_AT=$stage_started_at" >> "$GITHUB_ENV"
          python3 scripts/send_telemetry.py \
            --request-id "$REQUEST_ID" \
            --stage-key finalizing \
            --stage-state in_progress \
            --completed-stages 7 \
            --total-stages 8 \
            --build-started-at "$BUILD_STARTED_AT" \
            --stage-started-at "$stage_started_at" \
            --message "Finalizing the build." || true

      - name: Send success notification
        if: success()
        working-directory: toolbuild
        env:
          NOTIFY_WORKFLOW_CONCLUSION: success
        run: python3 notify.py success "${{ github.repository }}" "$INPUT_URL" "xst" "$BUILDER_NAME" "$BUILDER_ID"

      - name: Telemetry - finalizing
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/send_telemetry.py \
            --request-id "$REQUEST_ID" \
            --stage-key finalizing \
            --stage-state success \
            --completed-stages 8 \
            --total-stages 8 \
            --build-started-at "$BUILD_STARTED_AT" \
            --stage-started-at "$DZ_STAGE_STARTED_AT" \
            --message "The build completed successfully." || true

      - name: Send failure notification
        if: failure() && hashFiles('toolbuild/notify.py') != ''
        working-directory: toolbuild
        env:
          NOTIFY_WORKFLOW_CONCLUSION: failure
          NOTIFY_ERROR_LOG: build_action.log
        run: python3 notify.py fail "${{ github.repository }}" "$INPUT_URL" "xst" "$BUILDER_NAME" "$BUILDER_ID"

      - name: Telemetry - failure
        if: failure()
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/send_telemetry.py \
            --request-id "$REQUEST_ID" \
            --stage-key "$DZ_CURRENT_STAGE_KEY" \
            --stage-state failed \
            --completed-stages "$DZ_COMPLETED_STAGES" \
            --total-stages 8 \
            --build-started-at "$BUILD_STARTED_AT" \
            --stage-started-at "$DZ_STAGE_STARTED_AT" \
            --message "The build failed." || true

      - name: Send cancellation notification
        if: cancelled() && hashFiles('toolbuild/notify.py') != ''
        working-directory: toolbuild
        env:
          NOTIFY_WORKFLOW_CONCLUSION: cancelled
          NOTIFY_ERROR_LOG: build_action.log
        run: python3 notify.py cancelled "${{ github.repository }}" "$INPUT_URL" "xst" "$BUILDER_NAME" "$BUILDER_ID"

      - name: Telemetry - cancelled
        if: cancelled()
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/send_telemetry.py \
            --request-id "$REQUEST_ID" \
            --stage-key "$DZ_CURRENT_STAGE_KEY" \
            --stage-state cancelled \
            --completed-stages "$DZ_COMPLETED_STAGES" \
            --total-stages 8 \
            --build-started-at "$BUILD_STARTED_AT" \
            --stage-started-at "$DZ_STAGE_STARTED_AT" \
            --message "The build was cancelled." || true
