name: "🔥 MEZO_Lite"

run-name: "🔥 MEZO_Lite • ${{ inputs.builder_name || 'MEZO' }}"

on:
  workflow_dispatch:
    inputs:
      input_url:
        description: "URL of the Xiaomi ROM to build"
        required: true
        type: string
      builder_name:
        description: "Builder name"
        required: false
        default: "MEZO"
        type: string
      builder_id:
        description: "Builder Telegram ID"
        required: false
        type: string
      publish_release:
        description: "Publish the completed build to the release channel?"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

concurrency:
  group: mezo-lite-build-queue
  cancel-in-progress: false

jobs:
  Initialize:
    name: "🔥 Build MEZO Lite"
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      INPUT_URL: ${{ inputs.input_url }}
      BUILDER_NAME: ${{ inputs.builder_name }}
      BUILDER_ID: ${{ inputs.builder_id }}
      REQUEST_SOURCE: buildext:${{ inputs.builder_name }}:${{ inputs.builder_id }}
      PUBLISH_RELEASE: ${{ inputs.publish_release }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      MEZO_PRIVATE_CHAT_ID: ${{ secrets.MEZO_PRIVATE_CHAT_ID }}
      TELEGRAM_RELEASE_GROUP_ID: ${{ secrets.TELEGRAM_RELEASE_GROUP_ID }}
      MEZO_CONTACT_LINK: ${{ secrets.MEZO_CONTACT_LINK }}
      UPDATES_GROUP_LINK: ${{ secrets.UPDATES_GROUP_LINK }}
      SCREENSHOTS_GROUP_LINK: ${{ secrets.SCREENSHOTS_GROUP_LINK }}
      CHAT_GROUP_LINK: ${{ secrets.CHAT_GROUP_LINK }}
      CHANGELOG_LINK: ${{ secrets.CHANGELOG_LINK }}
      SCREENSHOTS_POST_LINK: ${{ secrets.SCREENSHOTS_POST_LINK }}
      RCLONE_CONFIG_BASE64: ${{ secrets.RCLONE_CONFIG_BASE64 }}
      RCLONE_REMOTE_NAME: ${{ secrets.RCLONE_REMOTE_NAME }}
      RCLONE_UPLOAD_DIR: ${{ secrets.RCLONE_UPLOAD_DIR }}

    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          swap-size-mb: 1024
          root-reserve-mb: 512
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"

      - name: Clean unused files and applications
        run: |
          docker rmi $(docker images -q) 2>/dev/null || true
          sudo rm -rf /usr/share/dotnet /etc/mysql /etc/php /etc/sudo/apt/sources.list.d || true
          sudo apt-get -y purge azure-cli 'ghc*' 'zulu*' 'hhvm*' 'llvm*' firefox 'google*' 'dotnet*' powershell 'mysql*' 'php*' || true
          sudo apt-get -y autoremove --purge || true
          sudo apt-get -y autoclean || true
          sudo apt-get clean || true

      - name: Clone private MEZO Lite source
        uses: actions/checkout@v4
        with:
          repository: hypermezo4-create/DeadZone_Lite
          token: ${{ secrets.GH_TOKEN }}
          ref: main
          path: toolbuild
          fetch-depth: 1
          lfs: true
          persist-credentials: false

      - name: Set Cairo timezone
        run: sudo timedatectl set-timezone Africa/Cairo

      - name: Install OpenJDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install build tools
        working-directory: toolbuild
        run: |
          set -e
          set -o pipefail
          echo "[STEP] Install tools" | tee -a build_action.log
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test 2>&1 | tee -a build_action.log
          sudo apt-get update 2>&1 | tee -a build_action.log
          sudo apt-get install -y aria2 jq rclone sshpass python-is-python3 wget python3 lz4 xz-utils device-tree-compiler zlib1g-dev gcc g++ libc6 libstdc++6 python3-pip dialog libgtk-3-dev aapt busybox zip erofs-utils unzip p7zip-full zipalign zstd bc android-sdk-libsparse-utils xmlstarlet golang-go 2>&1 | tee -a build_action.log
          sudo env "GOBIN=/usr/local/bin" go install github.com/ssut/payload-dumper-go/cmd/payload-dumper-go@latest 2>&1 | tee -a build_action.log || true
          sudo pip3 install ConfigObj requests telebot setuptools google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client 2>&1 | tee -a build_action.log

      - name: Grant file permissions
        working-directory: toolbuild
        run: sudo chmod 777 -R *

      - name: Send request notification
        working-directory: toolbuild
        run: |
          echo "CURRENT_STAGE=request_acknowledged" >> "$GITHUB_ENV"
          python3 notify.py private request_received

      - name: Build ROM
        working-directory: toolbuild
        run: |
          set -e
          set -o pipefail
          echo "CURRENT_STAGE=parse_rom_metadata" >> "$GITHUB_ENV"
          echo "[STEP] Build ROM" | tee -a build_action.log
          sudo -E env "PATH=$PATH" "HOME=$HOME" "GITHUB_ENV=$GITHUB_ENV" "GITHUB_WORKSPACE=$GITHUB_WORKSPACE" bash build.sh "$INPUT_URL" 2>&1 | tee -a build_action.log

      - name: Pack ROM
        working-directory: toolbuild
        run: |
          set -e
          set -o pipefail
          echo "CURRENT_STAGE=package" >> "$GITHUB_ENV"
          python3 notify.py private packaging_started
          echo "[STEP] Pack ROM" | tee -a build_action.log
          sudo -E env "PATH=$PATH" "HOME=$HOME" "GITHUB_ENV=$GITHUB_ENV" "GITHUB_WORKSPACE=$GITHUB_WORKSPACE" bash packROM.sh 2>&1 | tee -a build_action.log

      - name: Set up Rclone
        working-directory: toolbuild
        run: |
          set -e
          set -o pipefail
          echo "CURRENT_STAGE=setup_rclone" >> "$GITHUB_ENV"
          echo "[STEP] Set up Rclone" | tee -a build_action.log
          sudo -E env "PATH=$PATH" "HOME=$HOME" "GITHUB_ENV=$GITHUB_ENV" "GITHUB_WORKSPACE=$GITHUB_WORKSPACE" bash uploadROM.sh setup 2>&1 | tee -a build_action.log

      - name: Upload ROM to Google Drive
        working-directory: toolbuild
        run: |
          set -e
          set -o pipefail
          echo "CURRENT_STAGE=upload_drive" >> "$GITHUB_ENV"
          python3 notify.py private upload_started
          echo "[STEP] Upload ROM to Google Drive" | tee -a build_action.log
          sudo -E env "PATH=$PATH" "HOME=$HOME" "GITHUB_ENV=$GITHUB_ENV" "GITHUB_WORKSPACE=$GITHUB_WORKSPACE" bash uploadROM.sh 2>&1 | tee -a build_action.log

      - name: Send success notification
        if: success()
        working-directory: toolbuild
        run: python3 notify.py private success

      - name: Publish release
        if: success() && inputs.publish_release == 'true'
        working-directory: toolbuild
        run: |
          echo "CURRENT_STAGE=release_notification" >> "$GITHUB_ENV"
          python3 notify.py release success

      - name: Request manual publish decision
        if: success() && inputs.publish_release != 'true'
        working-directory: toolbuild
        run: python3 notify.py private publish_prompt

      - name: Send failure notification
        if: failure() && hashFiles('toolbuild/notify.py') != ''
        working-directory: toolbuild
        run: python3 notify.py private fail "${CURRENT_STAGE:-unknown}"

      - name: Send cancellation notification
        if: cancelled() && hashFiles('toolbuild/notify.py') != ''
        working-directory: toolbuild
        run: python3 notify.py private fail cancelled
