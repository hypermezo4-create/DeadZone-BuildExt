name: DeadZone Lite Xiaomi Build

run-name: "DeadZone Lite  ${{ inputs.request_id }}"

on:
  workflow_dispatch:
    inputs:
      request_id:
        description: DeadZone Lite request ID
        required: true
        type: string
      input_url:
        description: HTTPS URL of the source ROM
        required: true
        type: string
      builder_name:
        description: Builder name
        required: false
        type: string
      builder_id:
        description: Builder ID
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: deadzone-lite
  cancel-in-progress: false

jobs:
  build:
    name: Build ROM
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      REQUEST_ID: ${{ inputs.request_id }}
      INPUT_URL: ${{ inputs.input_url }}
      BUILDER_NAME: ${{ inputs.builder_name }}
      BUILDER_ID: ${{ inputs.builder_id }}
      CONTROL_BOT_TELEMETRY_URL: https://deadzonebot.fly.dev/telemetry

    steps:
      - name: Checkout DeadZone-BuildExt launcher
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Validate request before private checkout
        shell: bash
        env:
          ENGINE_REPOSITORY: ${{ secrets.LITE_ENGINE_REPOSITORY }}
          PRIVATE_REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
          RCLONE_CONFIG_BASE64: ${{ secrets.RCLONE_CONFIG_BASE64 }}
          RCLONE_REMOTE_NAME: ${{ secrets.RCLONE_REMOTE_NAME }}
          RCLONE_UPLOAD_DIR: ${{ secrets.LITE_RCLONE_UPLOAD_DIR }}
          BUILD_PROGRESS_SECRET: ${{ secrets.BUILD_PROGRESS_SECRET }}
        run: |
          set -Eeuo pipefail
          [[ "$REQUEST_ID" =~ ^DZ-LT-[0-9]{8}-[0-9]{4}$ ]] || { echo "Invalid Lite request ID." >&2; exit 1; }
          python3 scripts/validate_rom_url.py "$INPUT_URL"
          for key in ENGINE_REPOSITORY PRIVATE_REPO_TOKEN RCLONE_CONFIG_BASE64 RCLONE_REMOTE_NAME RCLONE_UPLOAD_DIR BUILD_PROGRESS_SECRET; do
            [[ -n "${!key:-}" ]] || { echo "Missing required configuration: $key" >&2; exit 1; }
          done
          echo "BUILD_STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Telemetry - preparing
        shell: bash
        env:
          BUILD_PROGRESS_SECRET: ${{ secrets.BUILD_PROGRESS_SECRET }}
        run: bash scripts/emit_stage.sh preparing in_progress 0 "Preparing the DeadZone Lite build."

      - name: Prepare hosted runner disk
        uses: easimon/maximize-build-space@c28619d8999a147d5e09c1199f84ff6af6ad5794
        with:
          swap-size-mb: 1024
          root-reserve-mb: 768
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: Gate available disk before engine checkout
        shell: bash
        run: |
          set -Eeuo pipefail
          df -h /; df -i /
          available="$(df -Pk / | awk 'NR == 2 {print $4 * 1024}')"
          (( available >= 25 * 1024 * 1024 * 1024 )) || { echo "At least 25 GiB free is required before engine checkout." >&2; exit 1; }

      - name: Telemetry - loading build engine
        shell: bash
        env:
          BUILD_PROGRESS_SECRET: ${{ secrets.BUILD_PROGRESS_SECRET }}
        run: bash scripts/emit_stage.sh loading_engine in_progress 1 "Loading the pinned Lite engine."

      - name: Checkout private Lite engine
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: ${{ secrets.LITE_ENGINE_REPOSITORY }}
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          ref: b0d02fb3a69e52d330f6ec525b786097d4342c1f
          path: toolbuild
          fetch-depth: 1
          lfs: true
          persist-credentials: false

      - name: Report disk after engine checkout
        shell: bash
        run: df -h / && df -i /

      - name: Set up OpenJDK 17
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00
        with:
          distribution: temurin
          java-version: '17'

      - name: Telemetry - installing tools
        shell: bash
        env:
          BUILD_PROGRESS_SECRET: ${{ secrets.BUILD_PROGRESS_SECRET }}
        run: bash scripts/emit_stage.sh installing_tools in_progress 2 "Installing pinned Lite build tools."

      - name: Install pinned build dependencies
        working-directory: toolbuild
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 -m venv .venv
          . .venv/bin/activate
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          bash setup.sh 2>&1 | tee -a build_action.log

      - name: Notify build start
        working-directory: toolbuild
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: python notify.py start "${{ github.repository }}" verified-rom-input lite "$BUILDER_NAME" "$BUILDER_ID"

      - name: Telemetry - building
        shell: bash
        env:
          BUILD_PROGRESS_SECRET: ${{ secrets.BUILD_PROGRESS_SECRET }}
        run: bash scripts/emit_stage.sh building in_progress 3 "Building the Lite ROM."

      - name: Build ROM
        working-directory: toolbuild
        shell: bash
        run: |
          set -Eeuo pipefail
          bash build.sh "$INPUT_URL" "${{ github.repository }}" lite "$BUILDER_NAME" "$BUILDER_ID" 2>&1 | tee -a build_action.log
          df -h /; df -i /

      - name: Telemetry - packaging
        shell: bash
        env:
          BUILD_PROGRESS_SECRET: ${{ secrets.BUILD_PROGRESS_SECRET }}
        run: bash scripts/emit_stage.sh packaging in_progress 4 "Packaging the Lite ROM."

      - name: Pack ROM
        working-directory: toolbuild
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: |
          set -Eeuo pipefail
          python notify.py pack "${{ github.repository }}" verified-rom-input lite "$BUILDER_NAME" "$BUILDER_ID"
          bash packROM.sh 2>&1 | tee -a build_action.log
          [[ -s build/baserom/images/super.img ]] || { echo "super.img is missing after packaging." >&2; exit 1; }
          df -h /; df -i /

      - name: Telemetry - preparing upload
        shell: bash
        env:
          BUILD_PROGRESS_SECRET: ${{ secrets.BUILD_PROGRESS_SECRET }}
        run: bash scripts/emit_stage.sh preparing_upload in_progress 5 "Preparing verified Google Drive delivery."

      - name: Telemetry - uploading
        shell: bash
        env:
          BUILD_PROGRESS_SECRET: ${{ secrets.BUILD_PROGRESS_SECRET }}
        run: bash scripts/emit_stage.sh uploading in_progress 6 "Uploading the Lite package to Google Drive."

      - name: Upload and verify Google Drive delivery
        working-directory: toolbuild
        shell: bash
        env:
          RCLONE_CONFIG_BASE64: ${{ secrets.RCLONE_CONFIG_BASE64 }}
          RCLONE_REMOTE_NAME: ${{ secrets.RCLONE_REMOTE_NAME }}
          RCLONE_UPLOAD_DIR: ${{ secrets.LITE_RCLONE_UPLOAD_DIR }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: |
          set -Eeuo pipefail
          df -h /; df -i /
          bash uploadROM.sh setup 2>&1 | tee -a build_action.log
          python notify.py upload "${{ github.repository }}" verified-rom-input lite "$BUILDER_NAME" "$BUILDER_ID"
          bash uploadROM.sh 2>&1 | tee -a build_action.log
          python3 ../scripts/validate_result_contract.py \
            --input bin/ddevice/deadzone_upload.json \
            --output ../deadzone-result.json \
            --request-id "$REQUEST_ID" \
            --project lite

      - name: Telemetry - finalizing start
        shell: bash
        env:
          BUILD_PROGRESS_SECRET: ${{ secrets.BUILD_PROGRESS_SECRET }}
        run: bash scripts/emit_stage.sh finalizing in_progress 7 "Finalizing the verified Lite result."

      - name: Expose only the verified result contract
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: deadzone-result-${{ inputs.request_id }}
          path: deadzone-result.json
          if-no-files-found: error
          retention-days: 1

      - name: Notify verified success
        if: success()
        working-directory: toolbuild
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          NOTIFY_WORKFLOW_CONCLUSION: success
        run: python notify.py success "${{ github.repository }}" verified-rom-input lite "$BUILDER_NAME" "$BUILDER_ID"

      - name: Telemetry - finalizing
        if: success()
        shell: bash
        env:
          BUILD_PROGRESS_SECRET: ${{ secrets.BUILD_PROGRESS_SECRET }}
        run: bash scripts/emit_stage.sh finalizing success 8 "The Lite result was verified."

      - name: Notify failure
        if: failure() && hashFiles('toolbuild/notify.py') != ''
        working-directory: toolbuild
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          NOTIFY_WORKFLOW_CONCLUSION: failure
          NOTIFY_ERROR_LOG: build_action.log
        run: python notify.py fail "${{ github.repository }}" verified-rom-input lite "$BUILDER_NAME" "$BUILDER_ID"

      - name: Telemetry - failure
        if: failure()
        shell: bash
        env:
          BUILD_PROGRESS_SECRET: ${{ secrets.BUILD_PROGRESS_SECRET }}
        run: bash scripts/emit_stage.sh "${DZ_CURRENT_STAGE_KEY:-preparing}" failed "${DZ_COMPLETED_STAGES:-0}" "The Lite build failed."

      - name: Notify cancellation
        if: cancelled() && hashFiles('toolbuild/notify.py') != ''
        working-directory: toolbuild
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          NOTIFY_WORKFLOW_CONCLUSION: cancelled
          NOTIFY_ERROR_LOG: build_action.log
        run: python notify.py cancelled "${{ github.repository }}" verified-rom-input lite "$BUILDER_NAME" "$BUILDER_ID"

      - name: Telemetry - cancelled
        if: cancelled()
        shell: bash
        env:
          BUILD_PROGRESS_SECRET: ${{ secrets.BUILD_PROGRESS_SECRET }}
        run: bash scripts/emit_stage.sh "${DZ_CURRENT_STAGE_KEY:-preparing}" cancelled "${DZ_COMPLETED_STAGES:-0}" "The Lite build was cancelled."

      - name: Remove temporary secrets
        if: always()
        shell: bash
        run: rm -f -- "$RUNNER_TEMP/deadzone-rclone-$REQUEST_ID.conf"
