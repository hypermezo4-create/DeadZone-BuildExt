name: DeadZone Lite Xiaomi Build

run-name: "DeadZone Lite - ${{ inputs.builder_name }}"

on:
  workflow_dispatch:
    inputs:
      builder_name:
        description: 'Your name'
        required: true
        type: string
      input_url:
        description: 'Direct URL of the Xiaomi ROM'
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Build DeadZone Lite
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      INPUT_URL: ${{ inputs.input_url }}
      BUILDER_NAME: ${{ inputs.builder_name }}
      ENGINE_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN || secrets.GH_TOKEN }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}

    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          swap-size-mb: 1024
          root-reserve-mb: 512
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: Clean unused files
        shell: bash
        run: |
          docker rmi $(docker images -q) 2>/dev/null || true
          sudo rm -rf /usr/share/dotnet /etc/mysql /etc/php || true
          sudo apt-get -y purge azure-cli 'ghc*' 'zulu*' 'llvm*' firefox 'google*' 'dotnet*' powershell 'mysql*' 'php*' || true
          sudo apt-get -y autoremove --purge || true
          sudo apt-get clean || true

      - name: Validate inputs
        shell: bash
        run: |
          set -Eeuo pipefail
          [[ -n "$BUILDER_NAME" ]] || { echo "Builder name is required." >&2; exit 1; }
          [[ "$INPUT_URL" =~ ^https?:// ]] || { echo "A direct HTTP or HTTPS ROM URL is required." >&2; exit 1; }
          [[ -n "$ENGINE_TOKEN" ]] || { echo "PRIVATE_REPO_TOKEN or GH_TOKEN secret is required." >&2; exit 1; }

      - name: Clone DeadZone Lite source
        uses: actions/checkout@v4
        with:
          repository: hypermezo4-create/DeadZone_xiaomi-Lite
          token: ${{ env.ENGINE_TOKEN }}
          ref: main
          path: toolbuild
          fetch-depth: 1
          lfs: true
          persist-credentials: false

      - name: Set up OpenJDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install build tools
        working-directory: toolbuild
        shell: bash
        run: |
          set -Eeuo pipefail
          echo "[STEP] Install tools" | tee -a build_action.log
          sudo apt-get update 2>&1 | tee -a build_action.log
          sudo apt-get install -y aria2 jq rclone sshpass python-is-python3 wget python3 lz4 xz-utils device-tree-compiler zlib1g-dev gcc g++ libc6 libstdc++6 python3-pip dialog libgtk-3-dev aapt busybox zip erofs-utils unzip p7zip-full zipalign zstd bc android-sdk-libsparse-utils xmlstarlet 2>&1 | tee -a build_action.log
          sudo pip3 install requests ConfigObj telebot setuptools google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client 2>&1 | tee -a build_action.log

      - name: Grant file permissions
        working-directory: toolbuild
        shell: bash
        run: sudo chmod -R u+rwX,go+rX .

      - name: Send start notification
        working-directory: toolbuild
        shell: bash
        run: python3 notify.py start "${{ github.repository }}" "$INPUT_URL" lite "$BUILDER_NAME" ""

      - name: Build ROM
        working-directory: toolbuild
        shell: bash
        run: |
          set -Eeuo pipefail
          echo "[STEP] Build ROM" | tee -a build_action.log
          sudo -E bash build.sh "$INPUT_URL" "${{ github.repository }}" lite "$BUILDER_NAME" "" 2>&1 | tee -a build_action.log

      - name: Pack ROM
        working-directory: toolbuild
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 notify.py pack "${{ github.repository }}" "$INPUT_URL" lite "$BUILDER_NAME" ""
          echo "[STEP] Pack ROM" | tee -a build_action.log
          sudo -E bash packROM.sh 2>&1 | tee -a build_action.log

      - name: Set up cloud upload
        working-directory: toolbuild
        shell: bash
        run: |
          set -Eeuo pipefail
          [[ -n "${{ secrets.GH_REPO }}" ]] || { echo "GH_REPO secret is required." >&2; exit 1; }
          [[ -n "${{ secrets.RCLONE_TOKEN_PATH }}" ]] || { echo "RCLONE_TOKEN_PATH secret is required." >&2; exit 1; }
          echo "[STEP] Set up cloud upload" | tee -a build_action.log
          sudo -E bash uploadROM.sh setup "$ENGINE_TOKEN" "${{ secrets.GH_REPO }}" "${{ secrets.RCLONE_TOKEN_PATH }}" 2>&1 | tee -a build_action.log

      - name: Upload ROM
        working-directory: toolbuild
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 notify.py upload "${{ github.repository }}" "$INPUT_URL" lite "$BUILDER_NAME" ""
          echo "[STEP] Upload ROM" | tee -a build_action.log
          sudo -E bash uploadROM.sh 2>&1 | tee -a build_action.log

      - name: Send success notification
        if: success()
        working-directory: toolbuild
        env:
          NOTIFY_WORKFLOW_CONCLUSION: success
        run: python3 notify.py success "${{ github.repository }}" "$INPUT_URL" lite "$BUILDER_NAME" ""

      - name: Send failure notification
        if: failure() && hashFiles('toolbuild/notify.py') != ''
        working-directory: toolbuild
        env:
          NOTIFY_WORKFLOW_CONCLUSION: failure
          NOTIFY_ERROR_LOG: build_action.log
        run: python3 notify.py fail "${{ github.repository }}" "$INPUT_URL" lite "$BUILDER_NAME" ""

      - name: Send cancellation notification
        if: cancelled() && hashFiles('toolbuild/notify.py') != ''
        working-directory: toolbuild
        env:
          NOTIFY_WORKFLOW_CONCLUSION: cancelled
          NOTIFY_ERROR_LOG: build_action.log
          NOTIFY_ERROR_REASON: Workflow run was cancelled before completion.
        run: python3 notify.py cancelled "${{ github.repository }}" "$INPUT_URL" lite "$BUILDER_NAME" ""
