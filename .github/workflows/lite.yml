name: DeadZone Lite Xiaomi Build

run-name: "DeadZone Lite  ${{ inputs.request_id }}"

on:
  workflow_dispatch:
    inputs:
      request_id:
        description: DeadZone Lite request ID
        required: true
        type: string
      input_url:
        description: ROM source URL
        required: true
        type: string
      builder_name:
        description: Telegram builder name
        required: false
        type: string
      builder_id:
        description: Telegram builder ID
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: deadzone-lite
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      REQUEST_ID: ${{ inputs.request_id }}
      INPUT_URL: ${{ inputs.input_url }}
      BUILDER_NAME: ${{ inputs.builder_name }}
      BUILDER_ID: ${{ inputs.builder_id }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
      RCLONE_CONFIG_BASE64: ${{ secrets.RCLONE_CONFIG_BASE64 }}
      RCLONE_REMOTE_NAME: ${{ secrets.RCLONE_REMOTE_NAME }}
      RCLONE_UPLOAD_DIR: ${{ secrets.LITE_RCLONE_UPLOAD_DIR }}
      PIXELDRAIN_API_KEY: ${{ secrets.PIXELDRAIN_API_KEY }}
      BUILD_PROGRESS_SECRET: ${{ secrets.BUILD_PROGRESS_SECRET }}
      CONTROL_BOT_TELEMETRY_URL: https://deadzonebot.fly.dev/telemetry
    steps:
      - name: Checkout DeadZone-BuildExt launcher
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Validate Lite request and secrets
        shell: bash
        env:
          LITE_ENGINE_REPOSITORY: ${{ secrets.LITE_ENGINE_REPOSITORY }}
          PRIVATE_REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          set -euo pipefail
          [[ "$REQUEST_ID" =~ ^DZ-LT-[0-9]{8}-[0-9]{4}$ ]] || { echo "Invalid request_id" >&2; exit 1; }
          [[ "$INPUT_URL" =~ ^https:// ]] || { echo "input_url must be HTTPS" >&2; exit 1; }
          for key in LITE_ENGINE_REPOSITORY PRIVATE_REPO_TOKEN RCLONE_CONFIG_BASE64 RCLONE_REMOTE_NAME RCLONE_UPLOAD_DIR BUILD_PROGRESS_SECRET; do
            [[ -n "${!key:-}" ]] || { echo "Missing required secret: $key" >&2; exit 1; }
          done

      - name: Initialize telemetry clock
        shell: bash
        run: echo "BUILD_STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Telemetry - preparing
        shell: bash
        run: |
          set -euo pipefail; now="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "DZ_CURRENT_STAGE_KEY=preparing" >> "$GITHUB_ENV"; echo "DZ_COMPLETED_STAGES=0" >> "$GITHUB_ENV"; echo "DZ_STAGE_STARTED_AT=$now" >> "$GITHUB_ENV"
          python3 scripts/send_telemetry.py --request-id "$REQUEST_ID" --stage-key preparing --stage-state in_progress --completed-stages 0 --total-stages 8 --build-started-at "$BUILD_STARTED_AT" --stage-started-at "$now" --message "Preparing the DeadZone Lite build." || echo "Telemetry delivery failed; build continues."

      - name: Telemetry - loading build engine
        shell: bash
        run: |
          set -euo pipefail; now="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "DZ_CURRENT_STAGE_KEY=loading_engine" >> "$GITHUB_ENV"; echo "DZ_COMPLETED_STAGES=1" >> "$GITHUB_ENV"; echo "DZ_STAGE_STARTED_AT=$now" >> "$GITHUB_ENV"
          python3 scripts/send_telemetry.py --request-id "$REQUEST_ID" --stage-key loading_engine --stage-state in_progress --completed-stages 1 --total-stages 8 --build-started-at "$BUILD_STARTED_AT" --stage-started-at "$now" --message "Loading the Lite engine." || echo "Telemetry delivery failed; build continues."

      - name: Prepare hosted runner disk
        shell: bash
        run: |
          set -euo pipefail
          df -h /; df -i /
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          docker system prune --all --force || true
          sudo apt-get clean
          df -h /; df -i /

      - name: Checkout private Lite engine
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.LITE_ENGINE_REPOSITORY }}
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          ref: main
          path: toolbuild
          fetch-depth: 1
          persist-credentials: false

      - name: Set up OpenJDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Telemetry - installing tools
        shell: bash
        run: |
          set -euo pipefail; now="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "DZ_CURRENT_STAGE_KEY=installing_tools" >> "$GITHUB_ENV"; echo "DZ_COMPLETED_STAGES=2" >> "$GITHUB_ENV"; echo "DZ_STAGE_STARTED_AT=$now" >> "$GITHUB_ENV"
          python3 scripts/send_telemetry.py --request-id "$REQUEST_ID" --stage-key installing_tools --stage-state in_progress --completed-stages 2 --total-stages 8 --build-started-at "$BUILD_STARTED_AT" --stage-started-at "$now" --message "Installing Lite build tools." || true

      - name: Setup Lite engine
        working-directory: toolbuild
        shell: bash
        run: |
          set -euo pipefail
          python3 -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip requests
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          sudo -E bash setup.sh 2>&1 | tee -a build_action.log

      - name: Telemetry - building
        shell: bash
        run: |
          set -euo pipefail; now="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "DZ_CURRENT_STAGE_KEY=building" >> "$GITHUB_ENV"; echo "DZ_COMPLETED_STAGES=3" >> "$GITHUB_ENV"; echo "DZ_STAGE_STARTED_AT=$now" >> "$GITHUB_ENV"
          python3 scripts/send_telemetry.py --request-id "$REQUEST_ID" --stage-key building --stage-state in_progress --completed-stages 3 --total-stages 8 --build-started-at "$BUILD_STARTED_AT" --stage-started-at "$now" --message "Building the Lite ROM." || true

      - name: Build ROM
        working-directory: toolbuild
        shell: bash
        run: sudo -E bash build.sh "$INPUT_URL" "${{ github.repository }}" "lite" "$BUILDER_NAME" "$BUILDER_ID" 2>&1 | tee -a build_action.log

      - name: Telemetry - packaging
        shell: bash
        run: |
          set -euo pipefail; now="$(date -u +%Y-%m-%dT%H:%M:%SZ)"; echo "DZ_CURRENT_STAGE_KEY=packaging" >> "$GITHUB_ENV"; echo "DZ_COMPLETED_STAGES=4" >> "$GITHUB_ENV"; echo "DZ_STAGE_STARTED_AT=$now" >> "$GITHUB_ENV"
          python3 scripts/send_telemetry.py --request-id "$REQUEST_ID" --stage-key packaging --stage-state in_progress --completed-stages 4 --total-stages 8 --build-started-at "$BUILD_STARTED_AT" --stage-started-at "$now" --message "Packaging the Lite ROM." || true

      - name: Pack ROM
        working-directory: toolbuild
        shell: bash
        run: sudo -E bash packROM.sh 2>&1 | tee -a build_action.log

      - name: Telemetry - preparing upload
        shell: bash
        run: |
          set -euo pipefail; now="$(date -u +%Y-%m-%dT%H:%M:%SZ)"; echo "DZ_CURRENT_STAGE_KEY=preparing_upload" >> "$GITHUB_ENV"; echo "DZ_COMPLETED_STAGES=5" >> "$GITHUB_ENV"; echo "DZ_STAGE_STARTED_AT=$now" >> "$GITHUB_ENV"
          python3 scripts/send_telemetry.py --request-id "$REQUEST_ID" --stage-key preparing_upload --stage-state in_progress --completed-stages 5 --total-stages 8 --build-started-at "$BUILD_STARTED_AT" --stage-started-at "$now" --message "Preparing verified upload." || true

      - name: Set up Rclone
        working-directory: toolbuild
        shell: bash
        run: sudo -E bash uploadROM.sh setup 2>&1 | tee -a build_action.log

      - name: Telemetry - uploading
        shell: bash
        run: |
          set -euo pipefail; now="$(date -u +%Y-%m-%dT%H:%M:%SZ)"; echo "DZ_CURRENT_STAGE_KEY=uploading" >> "$GITHUB_ENV"; echo "DZ_COMPLETED_STAGES=6" >> "$GITHUB_ENV"; echo "DZ_STAGE_STARTED_AT=$now" >> "$GITHUB_ENV"
          python3 scripts/send_telemetry.py --request-id "$REQUEST_ID" --stage-key uploading --stage-state in_progress --completed-stages 6 --total-stages 8 --build-started-at "$BUILD_STARTED_AT" --stage-started-at "$now" --message "Uploading the verified package." || true

      - name: Upload ROM
        working-directory: toolbuild
        shell: bash
        run: sudo -E bash uploadROM.sh 2>&1 | tee -a build_action.log

      - name: Telemetry - finalizing start
        shell: bash
        run: |
          set -euo pipefail; now="$(date -u +%Y-%m-%dT%H:%M:%SZ)"; echo "DZ_CURRENT_STAGE_KEY=finalizing" >> "$GITHUB_ENV"; echo "DZ_COMPLETED_STAGES=7" >> "$GITHUB_ENV"; echo "DZ_STAGE_STARTED_AT=$now" >> "$GITHUB_ENV"
          python3 scripts/send_telemetry.py --request-id "$REQUEST_ID" --stage-key finalizing --stage-state in_progress --completed-stages 7 --total-stages 8 --build-started-at "$BUILD_STARTED_AT" --stage-started-at "$now" --message "Creating the result contract." || true

      - name: Create deadzone-result.json
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, os, re
          from pathlib import Path
          data=json.loads(Path('toolbuild/bin/ddevice/deadzone_upload.json').read_text())
          data.update(schema_version='1.0', request_id=os.environ['REQUEST_ID'], project='lite', status='success')
          assert re.fullmatch(r'DZ-LT-[0-9]{8}-[0-9]{4}', data['request_id'])
          assert data['provider'] in {'google_drive','pixeldrain'} and int(data['size']) > 0
          assert re.fullmatch(r'[a-f0-9]{64}', data['sha256']) and re.fullmatch(r'[A-Za-z0-9._-]+\.zip', data['file_name'])
          assert data['os'] in {'MIUI14','OS1','OS2','OS3'} and re.fullmatch(r'[a-z0-9._-]+', data['codename'])
          hosts={'google_drive': ('https://drive.google.com/','https://docs.google.com/'), 'pixeldrain': ('https://pixeldrain.com/',)}
          assert data['url'].startswith(hosts[data['provider']])
          Path('deadzone-result.json').write_text(json.dumps(data, sort_keys=True, indent=2)+'\n')
          PY

      - name: Upload verified result contract
        uses: actions/upload-artifact@v4
        with:
          name: deadzone-result-${{ inputs.request_id }}
          path: deadzone-result.json
          if-no-files-found: error

      - name: Telemetry - finalizing
        if: success()
        shell: bash
        run: python3 scripts/send_telemetry.py --request-id "$REQUEST_ID" --stage-key finalizing --stage-state success --completed-stages 8 --total-stages 8 --build-started-at "$BUILD_STARTED_AT" --stage-started-at "$DZ_STAGE_STARTED_AT" --message "The Lite build completed successfully." || true

      - name: Telemetry - failure
        if: failure()
        shell: bash
        run: python3 scripts/send_telemetry.py --request-id "$REQUEST_ID" --stage-key "$DZ_CURRENT_STAGE_KEY" --stage-state failed --completed-stages "$DZ_COMPLETED_STAGES" --total-stages 8 --build-started-at "$BUILD_STARTED_AT" --stage-started-at "$DZ_STAGE_STARTED_AT" --message "The Lite build failed." || true

      - name: Telemetry - cancelled
        if: cancelled()
        shell: bash
        run: python3 scripts/send_telemetry.py --request-id "$REQUEST_ID" --stage-key "$DZ_CURRENT_STAGE_KEY" --stage-state cancelled --completed-stages "$DZ_COMPLETED_STAGES" --total-stages 8 --build-started-at "$BUILD_STARTED_AT" --stage-started-at "$DZ_STAGE_STARTED_AT" --message "The Lite build was cancelled." || true

      - name: Remove temporary rclone configuration
        if: always()
        shell: bash
        run: rm -f toolbuild/.rclone.deadzone.conf
