name: DeadZone FrameworkPatcher Build

run-name: "DeadZone FrameworkPatcher  ${{ inputs.request_id }}"

on:
  workflow_dispatch:
    inputs:
      request_id:
        description: DeadZone control request ID
        required: true
        type: string
      android_version:
        description: Android major version
        required: true
        type: choice
        options:
          - '13'
          - '14'
          - '15'
          - '16'
      framework_url:
        description: Google Drive or GitHub URL for framework.jar
        required: false
        type: string
      framework_telegram_file_id:
        description: Private Telegram file reference for framework.jar
        required: false
        type: string
      services_url:
        description: Google Drive or GitHub URL for services.jar
        required: false
        type: string
      services_telegram_file_id:
        description: Private Telegram file reference for services.jar
        required: false
        type: string
      miui_services_url:
        description: Google Drive or GitHub URL for miui-services.jar
        required: false
        type: string
      miui_services_telegram_file_id:
        description: Private Telegram file reference for miui-services.jar
        required: false
        type: string
      miui_framework_url:
        description: Google Drive or GitHub URL for miui-framework.jar
        required: false
        type: string
      miui_framework_telegram_file_id:
        description: Private Telegram file reference for miui-framework.jar
        required: false
        type: string
      features:
        description: Comma-separated DeadZone feature keys
        required: true
        type: string
      device_name:
        description: Safe device label
        required: true
        type: string
      rom_version:
        description: Real ROM version
        required: true
        type: string
      builder_name:
        description: Telegram builder label
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: deadzone-frameworkpatcher
  cancel-in-progress: false

jobs:
  build:
    name: Build and deliver privately
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      REQUEST_ID: ${{ inputs.request_id }}
      ANDROID_VERSION: ${{ inputs.android_version }}
      FRAMEWORK_URL: ${{ inputs.framework_url }}
      SERVICES_URL: ${{ inputs.services_url }}
      MIUI_SERVICES_URL: ${{ inputs.miui_services_url }}
      MIUI_FRAMEWORK_URL: ${{ inputs.miui_framework_url }}
      FRAMEWORK_TELEGRAM_FILE_ID: ${{ inputs.framework_telegram_file_id }}
      SERVICES_TELEGRAM_FILE_ID: ${{ inputs.services_telegram_file_id }}
      MIUI_SERVICES_TELEGRAM_FILE_ID: ${{ inputs.miui_services_telegram_file_id }}
      MIUI_FRAMEWORK_TELEGRAM_FILE_ID: ${{ inputs.miui_framework_telegram_file_id }}
      FEATURES: ${{ inputs.features }}
      DEVICE_NAME: ${{ inputs.device_name }}
      ROM_VERSION: ${{ inputs.rom_version }}
      BUILDER_NAME: ${{ inputs.builder_name }}
      RCLONE_CONFIG_BASE64: ${{ secrets.RCLONE_CONFIG_BASE64 }}
      RCLONE_REMOTE_NAME: ${{ secrets.RCLONE_REMOTE_NAME }}
      RCLONE_UPLOAD_DIR: module
      BUILD_PROGRESS_SECRET: ${{ secrets.BUILD_PROGRESS_SECRET }}
      CONTROL_BOT_TELEMETRY_URL: https://deadzonebot.fly.dev/telemetry

    steps:
      - name: Checkout DeadZone-BuildExt launcher
        uses: actions/checkout@v4
        with:
          path: .
          fetch-depth: 1
          persist-credentials: false

      - name: Validate private request contract
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import re
          from urllib.parse import urlsplit

          request_id = os.environ["REQUEST_ID"].strip()
          android = os.environ["ANDROID_VERSION"].strip()
          device = os.environ["DEVICE_NAME"].strip()
          rom_version = os.environ["ROM_VERSION"].strip()
          features = [item.strip() for item in os.environ["FEATURES"].split(",") if item.strip()]
          urls = {
              "framework_url": os.environ.get("FRAMEWORK_URL", "").strip(),
              "services_url": os.environ.get("SERVICES_URL", "").strip(),
              "miui_services_url": os.environ.get("MIUI_SERVICES_URL", "").strip(),
              "miui_framework_url": os.environ.get("MIUI_FRAMEWORK_URL", "").strip(),
          }
          telegram_files = {
              "framework_url": os.environ.get("FRAMEWORK_TELEGRAM_FILE_ID", "").strip(),
              "services_url": os.environ.get("SERVICES_TELEGRAM_FILE_ID", "").strip(),
              "miui_services_url": os.environ.get("MIUI_SERVICES_TELEGRAM_FILE_ID", "").strip(),
              "miui_framework_url": os.environ.get("MIUI_FRAMEWORK_TELEGRAM_FILE_ID", "").strip(),
          }
          allowed_features = {
              "disable_signature_verification",
              "cn_notification_fix",
              "disable_secure_flag",
              "kaorios_toolbox",
              "add_gboard",
          }
          feature_inputs = {
              "disable_signature_verification": {"framework_url", "services_url", "miui_services_url"},
              "cn_notification_fix": {"miui_services_url"},
              "disable_secure_flag": {"services_url", "miui_services_url"},
              "kaorios_toolbox": {"framework_url"},
              "add_gboard": {"miui_services_url", "miui_framework_url"},
          }
          input_features = {
              "framework_url": {"disable_signature_verification", "kaorios_toolbox"},
              "services_url": {"disable_signature_verification", "disable_secure_flag"},
              "miui_services_url": {
                  "disable_signature_verification",
                  "cn_notification_fix",
                  "disable_secure_flag",
                  "add_gboard",
              },
              "miui_framework_url": {"add_gboard"},
          }
          allowed_hosts = {
              "drive.google.com",
              "docs.google.com",
              "github.com",
              "raw.githubusercontent.com",
              "objects.githubusercontent.com",
          }

          if not re.fullmatch(r"DZ-FP-[0-9]{8}-[0-9]{4}", request_id):
              raise SystemExit("Invalid DeadZone request contract")
          if android not in {"13", "14", "15", "16"}:
              raise SystemExit("Unsupported Android version")
          if not re.fullmatch(r"[A-Za-z0-9_.-]{1,48}", device):
              raise SystemExit("Invalid device label")
          if not re.fullmatch(r"[A-Za-z0-9][A-Za-z0-9 ._()+-]{0,63}", rom_version):
              raise SystemExit("Invalid ROM version")
          if not features or len(features) != len(set(features)):
              raise SystemExit("Select at least one unique feature")
          if any(feature not in allowed_features for feature in features):
              raise SystemExit("Unknown feature key")
          if android in {"13", "14"} and any(
              feature in {"cn_notification_fix", "disable_secure_flag"} for feature in features
          ):
              raise SystemExit("Selected feature is unavailable on this Android version")

          for name in urls:
              if urls[name] and telegram_files[name]:
                  raise SystemExit(f"{name} was provided more than once")
          present = {name for name in urls if urls[name] or telegram_files[name]}
          if not present:
              raise SystemExit("At least one framework JAR is required")
          for name, value in urls.items():
              if value:
                  parsed = urlsplit(value)
                  host = (parsed.hostname or "").lower().rstrip(".")
                  if (
                      parsed.scheme != "https"
                      or host not in allowed_hosts
                      or parsed.username
                      or parsed.password
                      or any(ord(char) < 32 or ord(char) == 127 for char in value)
                  ):
                      raise SystemExit(f"Untrusted URL for {name}")
              file_id = telegram_files[name]
              if file_id and not re.fullmatch(r"[A-Za-z0-9_-]{10,256}", file_id):
                  raise SystemExit(f"Invalid private Telegram file reference for {name}")

          selected = set(features)
          for feature in selected:
              if not (feature_inputs[feature] & present):
                  raise SystemExit(f"{feature} has no compatible input JAR")
          active_inputs = sorted(
              name for name in present if input_features[name] & selected
          )
          if not active_inputs:
              raise SystemExit("No input JAR can receive the selected features")

          config = {
              "schema_version": "1.0",
              "request_id": request_id,
              "android_version": android,
              "api_level": {"13": "33", "14": "34", "15": "35", "16": "36"}[android],
              "device_name": device,
              "rom_version": rom_version,
              "features": features,
              "urls": urls,
              "telegram_files": telegram_files,
              "active_inputs": active_inputs,
          }
          with open("build-config.json", "w", encoding="utf-8") as handle:
              json.dump(config, handle, indent=2)
          PY

      - name: Initialize telemetry clock
        shell: bash
        run: |
          set -euo pipefail
          echo "BUILD_STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Telemetry - preparing
        shell: bash
        run: |
          set -euo pipefail
          stage_started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "DZ_CURRENT_STAGE_KEY=preparing" >> "$GITHUB_ENV"
          echo "DZ_COMPLETED_STAGES=0" >> "$GITHUB_ENV"
          echo "DZ_STAGE_STARTED_AT=$stage_started_at" >> "$GITHUB_ENV"
          python3 scripts/send_telemetry.py \
            --request-id "$REQUEST_ID" \
            --stage-key preparing \
            --stage-state in_progress \
            --completed-stages 0 \
            --total-stages 8 \
            --build-started-at "$BUILD_STARTED_AT" \
            --stage-started-at "$stage_started_at" \
            --message "Preparing the FrameworkPatcher build." || true

      - name: Telemetry - loading build engine
        shell: bash
        run: |
          set -euo pipefail
          stage_started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "DZ_CURRENT_STAGE_KEY=loading_engine" >> "$GITHUB_ENV"
          echo "DZ_COMPLETED_STAGES=1" >> "$GITHUB_ENV"
          echo "DZ_STAGE_STARTED_AT=$stage_started_at" >> "$GITHUB_ENV"
          python3 scripts/send_telemetry.py \
            --request-id "$REQUEST_ID" \
            --stage-key loading_engine \
            --stage-state in_progress \
            --completed-stages 1 \
            --total-stages 8 \
            --build-started-at "$BUILD_STARTED_AT" \
            --stage-started-at "$stage_started_at" \
            --message "Loading the build engine." || true

      - name: Checkout DeadZone engine
        uses: actions/checkout@v4
        with:
          repository: hypermezo4-create/FrameworkPatcher-DeadZone
          token: ${{ secrets.PRIVATE_REPO_TOKEN || github.token }}
          ref: main
          path: engine
          fetch-depth: 1
          persist-credentials: false

      - name: Prepare owned module path
        shell: bash
        run: rm -rf engine/templates/framework-patcher-module

      - name: Checkout MEZO module template
        uses: actions/checkout@v4
        with:
          repository: hypermezo4-create/FrameworkPatcherModule
          token: ${{ secrets.PRIVATE_REPO_TOKEN || github.token }}
          ref: main
          path: engine/templates/framework-patcher-module
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Telemetry - installing tools
        shell: bash
        run: |
          set -euo pipefail
          stage_started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "DZ_CURRENT_STAGE_KEY=installing_tools" >> "$GITHUB_ENV"
          echo "DZ_COMPLETED_STAGES=2" >> "$GITHUB_ENV"
          echo "DZ_STAGE_STARTED_AT=$stage_started_at" >> "$GITHUB_ENV"
          python3 scripts/send_telemetry.py \
            --request-id "$REQUEST_ID" \
            --stage-key installing_tools \
            --stage-state in_progress \
            --completed-stages 2 \
            --total-stages 8 \
            --build-started-at "$BUILD_STARTED_AT" \
            --stage-started-at "$stage_started_at" \
            --message "Installing build tools." || true

      - name: Install trusted build dependencies
        shell: bash
        run: |
          set -euo pipefail
          python3 -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install gdown
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          sudo apt-get update -qq
          sudo apt-get install -y -qq p7zip-full rclone

      - name: Download and validate active JAR inputs
        working-directory: engine
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          cp ../build-config.json .
          python3 - <<'PY'
          import json
          import os
          import pathlib
          import re
          import subprocess
          import urllib.parse
          import urllib.request
          import zipfile

          names = {
              "framework_url": "framework.jar",
              "services_url": "services.jar",
              "miui_services_url": "miui-services.jar",
              "miui_framework_url": "miui-framework.jar",
          }
          config = json.load(open("build-config.json", encoding="utf-8"))

          def stream_download(request, target, limit):
              with urllib.request.urlopen(request, timeout=120) as response, target.open("wb") as output:
                  total = 0
                  while True:
                      chunk = response.read(1024 * 1024)
                      if not chunk:
                          break
                      total += len(chunk)
                      if total > limit:
                          raise SystemExit("Input JAR exceeds its download limit")
                      output.write(chunk)

          def download_telegram(file_id, target):
              token = os.environ.get("TELEGRAM_BOT_TOKEN", "").strip()
              if not token:
                  raise SystemExit("Private Telegram input support is not configured")
              try:
                  query = urllib.parse.urlencode({"file_id": file_id})
                  metadata_request = urllib.request.Request(
                      f"https://api.telegram.org/bot{token}/getFile?{query}",
                      headers={"User-Agent": "DeadZone-BuildService/1.0"},
                  )
                  with urllib.request.urlopen(metadata_request, timeout=30) as response:
                      metadata = json.load(response)
                  result = metadata.get("result") if metadata.get("ok") is True else None
                  file_path = result.get("file_path") if isinstance(result, dict) else None
                  file_size = result.get("file_size") if isinstance(result, dict) else None
                  if (
                      not isinstance(file_path, str)
                      or not re.fullmatch(r"[A-Za-z0-9_./-]{1,512}", file_path)
                      or ".." in file_path.split("/")
                      or (isinstance(file_size, int) and file_size > 20_000_000)
                  ):
                      raise ValueError("invalid Telegram file metadata")
                  download_request = urllib.request.Request(
                      f"https://api.telegram.org/file/bot{token}/{file_path}",
                      headers={"User-Agent": "DeadZone-BuildService/1.0"},
                  )
                  stream_download(download_request, target, 20_000_000)
              except SystemExit:
                  raise
              except Exception:
                  raise SystemExit(f"Unable to download private Telegram input {target.name}") from None

          for key in config["active_inputs"]:
              url = config["urls"][key]
              telegram_file_id = config["telegram_files"][key]
              target = pathlib.Path(names[key])
              if telegram_file_id:
                  download_telegram(telegram_file_id, target)
              elif "drive.google.com" in url or "docs.google.com" in url:
                  subprocess.run(
                      ["python3", "-m", "gdown", "--fuzzy", url, "-O", str(target)],
                      check=True,
                  )
              else:
                  request = urllib.request.Request(
                      url,
                      headers={"User-Agent": "DeadZone-BuildService/1.0"},
                  )
                  stream_download(request, target, 1610612736)
              size = target.stat().st_size
              if size < 128 or size > 1610612736:
                  raise SystemExit(f"Invalid size for {target.name}")
              if not zipfile.is_zipfile(target):
                  raise SystemExit(f"{target.name} is not a valid JAR")
          PY

      - name: Telemetry - building
        shell: bash
        run: |
          set -euo pipefail
          stage_started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "DZ_CURRENT_STAGE_KEY=building" >> "$GITHUB_ENV"
          echo "DZ_COMPLETED_STAGES=3" >> "$GITHUB_ENV"
          echo "DZ_STAGE_STARTED_AT=$stage_started_at" >> "$GITHUB_ENV"
          python3 scripts/send_telemetry.py \
            --request-id "$REQUEST_ID" \
            --stage-key building \
            --stage-state in_progress \
            --completed-stages 3 \
            --total-stages 8 \
            --build-started-at "$BUILD_STARTED_AT" \
            --stage-started-at "$stage_started_at" \
            --message "Building the module." || true

      - name: Run hardened FrameworkPatcher engine
        working-directory: engine
        env:
          DEADZONE_STRICT_PATCHES: '1'
          WORKFLOW_RUN_ID: ${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import subprocess
          import sys

          jar_flags = {
              "framework_url": "--framework",
              "services_url": "--services",
              "miui_services_url": "--miui-services",
              "miui_framework_url": "--miui-framework",
          }
          feature_flags = {
              "disable_signature_verification": "--disable-signature-verification",
              "cn_notification_fix": "--cn-notification-fix",
              "disable_secure_flag": "--disable-secure-flag",
              "kaorios_toolbox": "--kaorios-toolbox",
              "add_gboard": "--add-gboard",
          }
          config = json.load(open("build-config.json", encoding="utf-8"))
          args = [
              "bash",
              "-e",
              "-u",
              "-o",
              "pipefail",
              f"scripts/patcher_a{config['android_version']}.sh",
              config["api_level"],
              config["device_name"],
              config["rom_version"],
          ]
          args.extend(jar_flags[name] for name in config["active_inputs"])
          args.extend(feature_flags[name] for name in config["features"])

          with open("deadzone-build.log", "w", encoding="utf-8") as log:
              process = subprocess.Popen(
                  args,
                  stdout=subprocess.PIPE,
                  stderr=subprocess.STDOUT,
                  text=True,
              )
              assert process.stdout is not None
              for line in process.stdout:
                  sys.stdout.write(line)
                  log.write(line)
              return_code = process.wait()
          if return_code:
              raise SystemExit(return_code)
          PY

      - name: Telemetry - packaging
        shell: bash
        run: |
          set -euo pipefail
          stage_started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "DZ_CURRENT_STAGE_KEY=packaging" >> "$GITHUB_ENV"
          echo "DZ_COMPLETED_STAGES=4" >> "$GITHUB_ENV"
          echo "DZ_STAGE_STARTED_AT=$stage_started_at" >> "$GITHUB_ENV"
          python3 scripts/send_telemetry.py \
            --request-id "$REQUEST_ID" \
            --stage-key packaging \
            --stage-state in_progress \
            --completed-stages 4 \
            --total-stages 8 \
            --build-started-at "$BUILD_STARTED_AT" \
            --stage-started-at "$stage_started_at" \
            --message "Packaging the final module." || true

      - name: Reject false success and verify module contents
        working-directory: engine
        shell: bash
        run: |
          set -euo pipefail
          if grep -Eiq 'Strict patch contract failed|Critical Error|Method .+ not found|File not found' deadzone-build.log; then
            echo "A requested patch target was not applied" >&2
            exit 1
          fi
          python3 - <<'PY'
          import glob
          import hashlib
          import json
          import pathlib
          import re
          import zipfile

          jar_names = {
              "framework_url": "framework.jar",
              "services_url": "services.jar",
              "miui_services_url": "miui-services.jar",
              "miui_framework_url": "miui-framework.jar",
          }
          module_paths = {
              "framework_url": "system/framework/framework.jar",
              "services_url": "system/framework/services.jar",
              "miui_services_url": "system/system_ext/framework/miui-services.jar",
              "miui_framework_url": "system/system_ext/framework/miui-framework.jar",
          }
          config = json.load(open("build-config.json", encoding="utf-8"))
          outputs = glob.glob("Framework-Patcher-*.zip")
          if len(outputs) != 1:
              raise SystemExit("Expected exactly one output module")
          archive = pathlib.Path(outputs[0])
          with zipfile.ZipFile(archive) as module:
              names = set(module.namelist())
              for key in config["active_inputs"]:
                  path = module_paths[key]
                  if path not in names:
                      raise SystemExit(f"Module is missing {path}")
                  source_hash = hashlib.sha256(pathlib.Path(jar_names[key]).read_bytes()).hexdigest()
                  result_hash = hashlib.sha256(module.read(path)).hexdigest()
                  if source_hash == result_hash:
                      raise SystemExit(f"{path} was packaged without a real change")
              if "META-INF/build-manifest.json" not in names:
                  raise SystemExit("Build manifest is missing")
              prop = module.read("module.prop").decode("utf-8")
              if "name=FrameworkPatcher-DeadZone" not in prop:
                  raise SystemExit("DeadZone module name is missing")
              if "author=MEZO / DeadZone" not in prop:
                  raise SystemExit("DeadZone ownership is missing")
              if not re.search(r"^versionCode=[0-9]+$", prop, re.MULTILINE):
                  raise SystemExit("Module versionCode is invalid")

          pathlib.Path("artifact.env").write_text(
              "\n".join(
                  [
                      f"ARTIFACT={archive.name}",
                      f"SHA256={hashlib.sha256(archive.read_bytes()).hexdigest()}",
                      f"SIZE={archive.stat().st_size}",
                      "",
                  ]
              ),
              encoding="utf-8",
          )
          PY

      - name: Telemetry - preparing upload
        shell: bash
        run: |
          set -euo pipefail
          stage_started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "DZ_CURRENT_STAGE_KEY=preparing_upload" >> "$GITHUB_ENV"
          echo "DZ_COMPLETED_STAGES=5" >> "$GITHUB_ENV"
          echo "DZ_STAGE_STARTED_AT=$stage_started_at" >> "$GITHUB_ENV"
          python3 scripts/send_telemetry.py \
            --request-id "$REQUEST_ID" \
            --stage-key preparing_upload \
            --stage-state in_progress \
            --completed-stages 5 \
            --total-stages 8 \
            --build-started-at "$BUILD_STARTED_AT" \
            --stage-started-at "$stage_started_at" \
            --message "Preparing the Google Drive upload." || true

      - name: Telemetry - uploading
        working-directory: engine
        shell: bash
        run: |
          set -euo pipefail
          stage_started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          source artifact.env
          echo "DZ_CURRENT_STAGE_KEY=uploading" >> "$GITHUB_ENV"
          echo "DZ_COMPLETED_STAGES=6" >> "$GITHUB_ENV"
          echo "DZ_STAGE_STARTED_AT=$stage_started_at" >> "$GITHUB_ENV"
          python3 scripts/send_telemetry.py \
            --request-id "$REQUEST_ID" \
            --stage-key uploading \
            --stage-state in_progress \
            --completed-stages 6 \
            --total-stages 8 \
            --build-started-at "$BUILD_STARTED_AT" \
            --stage-started-at "$stage_started_at" \
            --processed-bytes 0 \
            --total-bytes "$SIZE" \
            --artifact-size "$SIZE" \
            --message "Uploading the FrameworkPatcher archive to Google Drive." || true

      - name: Upload output to Google Drive
        working-directory: engine
        shell: bash
        run: |
          set -euo pipefail
          [ -n "$RCLONE_CONFIG_BASE64" ] || { echo "Drive configuration is missing" >&2; exit 1; }
          [[ "$RCLONE_REMOTE_NAME" =~ ^[A-Za-z0-9_.-]+$ ]] || { echo "Invalid Drive remote name" >&2; exit 1; }
          source artifact.env
          config_path="$RUNNER_TEMP/rclone.conf"
          printf '%s' "$RCLONE_CONFIG_BASE64" | base64 --decode > "$config_path"
          chmod 600 "$config_path"
          upload_root="${RCLONE_UPLOAD_DIR:-DeadZoneBuilds}"
          upload_root="${upload_root#/}"
          upload_root="${upload_root%/}"
          remote_path="${RCLONE_REMOTE_NAME}:${upload_root}/FrameworkPatcher-DeadZone/${REQUEST_ID}/${ARTIFACT}"
          python3 ../scripts/rclone_telemetry.py \
            --request-id "$REQUEST_ID" \
            --source "$ARTIFACT" \
            --destination "$remote_path" \
            --config "$config_path" \
            --build-started-at "$BUILD_STARTED_AT" \
            --stage-started-at "$DZ_STAGE_STARTED_AT" \
            --stage-key uploading \
            --completed-stages 6 \
            --total-stages 8
          drive_link="$(rclone link "$remote_path" --config "$config_path")"
          case "$drive_link" in
            https://drive.google.com/*|https://docs.google.com/*) ;;
            *) echo "Google Drive did not return a valid delivery link" >&2; exit 1 ;;
          esac
          echo "::add-mask::$drive_link"
          {
            echo "DRIVE_LINK=$drive_link"
            echo "ARTIFACT_NAME=$ARTIFACT"
            echo "ARTIFACT_SHA256=$SHA256"
            echo "ARTIFACT_SIZE=$SIZE"
          } >> "$GITHUB_ENV"

      - name: Telemetry - finalizing start
        shell: bash
        run: |
          set -euo pipefail
          stage_started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "DZ_CURRENT_STAGE_KEY=finalizing" >> "$GITHUB_ENV"
          echo "DZ_COMPLETED_STAGES=7" >> "$GITHUB_ENV"
          echo "DZ_STAGE_STARTED_AT=$stage_started_at" >> "$GITHUB_ENV"
          python3 scripts/send_telemetry.py \
            --request-id "$REQUEST_ID" \
            --stage-key finalizing \
            --stage-state in_progress \
            --completed-stages 7 \
            --total-stages 8 \
            --build-started-at "$BUILD_STARTED_AT" \
            --stage-started-at "$stage_started_at" \
            --message "Finalizing the FrameworkPatcher result." || true

      - name: Create deadzone-result.json
        working-directory: engine
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os

          result = {
              "schema_version": "1.0",
              "request_id": os.environ["REQUEST_ID"],
              "project": "frameworkpatcher",
              "status": "success",
              "provider": "google_drive",
              "url": os.environ["DRIVE_LINK"],
              "file_name": os.environ["ARTIFACT_NAME"],
              "sha256": os.environ["ARTIFACT_SHA256"],
              "size": int(os.environ["ARTIFACT_SIZE"]),
              "android_version": os.environ["ANDROID_VERSION"],
              "device_name": os.environ["DEVICE_NAME"],
              "rom_version": os.environ["ROM_VERSION"],
              "features": [item for item in os.environ["FEATURES"].split(",") if item],
              "completed_at": __import__("datetime").datetime.now(__import__("datetime").timezone.utc).isoformat(),
          }
          with open("deadzone-result.json", "w", encoding="utf-8") as handle:
              json.dump(result, handle, indent=2)
          PY

      - name: Expose only the result contract to the control bot
        uses: actions/upload-artifact@v4
        with:
          name: deadzone-result-${{ inputs.request_id }}
          path: engine/deadzone-result.json
          if-no-files-found: error
          retention-days: 1

      - name: Telemetry - finalizing
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/send_telemetry.py \
            --request-id "$REQUEST_ID" \
            --stage-key finalizing \
            --stage-state success \
            --completed-stages 8 \
            --total-stages 8 \
            --build-started-at "$BUILD_STARTED_AT" \
            --stage-started-at "$DZ_STAGE_STARTED_AT" \
            --processed-bytes "$ARTIFACT_SIZE" \
            --total-bytes "$ARTIFACT_SIZE" \
            --artifact-size "$ARTIFACT_SIZE" \
            --message "The FrameworkPatcher result was verified." || true

      - name: Telemetry - failure
        if: failure()
        shell: bash
        run: |
          set -euo pipefail
          python3 ../scripts/send_telemetry.py \
            --request-id "$REQUEST_ID" \
            --stage-key "$DZ_CURRENT_STAGE_KEY" \
            --stage-state failed \
            --completed-stages "$DZ_COMPLETED_STAGES" \
            --total-stages 8 \
            --build-started-at "$BUILD_STARTED_AT" \
            --stage-started-at "$DZ_STAGE_STARTED_AT" \
            --message "The FrameworkPatcher build failed." || true

      - name: Telemetry - cancelled
        if: cancelled()
        shell: bash
        run: |
          set -euo pipefail
          python3 ../scripts/send_telemetry.py \
            --request-id "$REQUEST_ID" \
            --stage-key "$DZ_CURRENT_STAGE_KEY" \
            --stage-state cancelled \
            --completed-stages "$DZ_COMPLETED_STAGES" \
            --total-stages 8 \
            --build-started-at "$BUILD_STARTED_AT" \
            --stage-started-at "$DZ_STAGE_STARTED_AT" \
            --message "The FrameworkPatcher build was cancelled." || true
